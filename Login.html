<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <form action="Receitas.html" class="formulario">
        <h1>Login</h1>

        <label for="fname">Nome</label>
        <input type="text" id="fname" name="fname" placeholder="Digite seu nome" required>

        <label for="lname">Senha</label>
        <input type="password" id="lname" name="lname" placeholder="Digite sua senha" required>

        <label for="ftele">Telefone</label>
        <input type="tel" id="ftele" name="ftele" placeholder="(00) 00000-0000">

        <label for="femail">Email</label>
        <input type="email" id="femail" name="femail" placeholder="seu@email.com" required>

        <a href="erros.html" class="botao"> Enviar
    </form>
</div>

</body>
</html>
